<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Dashboard | Thajvi Attire Admin</title>
  <meta name="robots" content="noindex, nofollow" />
  <link rel="icon" href="../../assets/favicon/favicon.ico" sizes="32x32" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;500;600;700&family=Jost:wght@300;400;500;600&display=swap" rel="stylesheet" />
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Jost', sans-serif; background: #0A0A0A; color: #E8D5A0; min-height: 100vh; }
    a { color: inherit; text-decoration: none; }

    /* Login */
    .dash-login { max-width: 340px; margin: 120px auto; text-align: center; padding: 0 20px; }
    .dash-login h1 { font-family: 'Cormorant Garamond', serif; font-size: 1.6rem; margin-bottom: 8px; }
    .dash-login p { font-size: 0.82rem; color: #888; margin-bottom: 20px; }
    .dash-login input { width: 100%; padding: 14px; background: #1A1A1A; border: 1px solid #333; border-radius: 8px; color: #E8D5A0; font-size: 1rem; font-family: 'Jost', sans-serif; text-align: center; }
    .dash-login input:focus { outline: none; border-color: #C9A84C; }
    .dash-login button { width: 100%; padding: 14px; background: #C9A84C; color: #0A0A0A; border: none; border-radius: 8px; font-weight: 700; font-size: 0.9rem; cursor: pointer; margin-top: 12px; }
    .dash-login button:hover { background: #E8D5A0; }
    .dash-login-err { color: #FF4444; font-size: 0.82rem; margin-top: 8px; display: none; }

    /* Dashboard */
    .dash { display: none; padding: 20px; max-width: 1100px; margin: 0 auto; }
    .dash-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 28px; flex-wrap: wrap; gap: 12px; }
    .dash-title { font-family: 'Cormorant Garamond', serif; font-size: 1.5rem; }
    .dash-nav { display: flex; gap: 8px; flex-wrap: wrap; }
    .dash-nav a { padding: 8px 16px; background: #1A1A1A; border: 1px solid #333; border-radius: 6px; font-size: 0.78rem; font-weight: 500; transition: all 0.2s; }
    .dash-nav a:hover { border-color: #C9A84C; color: #C9A84C; }
    .dash-nav a.active { background: #C9A84C; color: #0A0A0A; border-color: #C9A84C; }

    /* Stats */
    .dash-stats { display: grid; grid-template-columns: repeat(4, 1fr); gap: 14px; margin-bottom: 24px; }
    .dash-stat { background: #111; border: 1px solid #222; border-radius: 10px; padding: 20px; text-align: center; }
    .dash-stat-num { font-family: 'Cormorant Garamond', serif; font-size: 2rem; font-weight: 700; color: #C9A84C; }
    .dash-stat-label { font-size: 0.7rem; color: #888; margin-top: 4px; text-transform: uppercase; letter-spacing: 1px; }
    .dash-stat.warn .dash-stat-num { color: #FFB347; }

    /* Filters */
    .dash-filters { display: flex; gap: 6px; margin-bottom: 20px; flex-wrap: wrap; align-items: center; }
    .dash-filter-btn { padding: 7px 14px; background: #1A1A1A; border: 1px solid #333; border-radius: 20px; font-size: 0.72rem; color: #888; cursor: pointer; transition: all 0.2s; font-family: 'Jost', sans-serif; }
    .dash-filter-btn:hover { border-color: #C9A84C; color: #C9A84C; }
    .dash-filter-btn.active { background: #C9A84C; color: #0A0A0A; border-color: #C9A84C; font-weight: 600; }
    .dash-search { flex: 1; min-width: 200px; padding: 8px 14px; background: #1A1A1A; border: 1px solid #333; border-radius: 20px; color: #E8D5A0; font-size: 0.82rem; font-family: 'Jost', sans-serif; }
    .dash-search:focus { outline: none; border-color: #C9A84C; }

    /* Orders table */
    .dash-table-wrap { overflow-x: auto; -webkit-overflow-scrolling: touch; }
    .dash-table { width: 100%; border-collapse: collapse; font-size: 0.82rem; }
    .dash-table th { text-align: left; font-size: 0.68rem; font-weight: 600; letter-spacing: 1px; text-transform: uppercase; color: #C9A84C; padding: 10px 8px; border-bottom: 1px solid #222; white-space: nowrap; }
    .dash-table td { padding: 14px 8px; border-bottom: 1px solid rgba(201,168,76,0.06); vertical-align: top; }
    .dash-table tr:hover td { background: rgba(201,168,76,0.03); }
    .dash-oid { color: #C9A84C; font-weight: 600; font-size: 0.78rem; }
    .dash-customer { font-weight: 500; }
    .dash-phone { font-size: 0.72rem; color: #888; }
    .dash-items { font-size: 0.72rem; color: #999; max-width: 200px; }

    /* Status badges */
    .badge { display: inline-block; padding: 3px 10px; border-radius: 20px; font-size: 0.65rem; font-weight: 600; letter-spacing: 0.5px; }
    .badge-pending { background: rgba(255,193,7,0.15); color: #FFC107; }
    .badge-paid { background: rgba(76,175,80,0.15); color: #4CAF50; }
    .badge-failed { background: rgba(244,67,54,0.15); color: #F44336; }
    .badge-packed { background: rgba(255,152,0,0.15); color: #FF9800; }
    .badge-shipped { background: rgba(156,39,176,0.15); color: #9C27B0; }
    .badge-delivered { background: rgba(76,175,80,0.15); color: #4CAF50; }
    .badge-cancelled { background: rgba(244,67,54,0.15); color: #F44336; }
    .badge-pending_verification { background: rgba(255,152,0,0.15); color: #FF9800; }

    /* Action buttons */
    .dash-action { display: flex; gap: 6px; }
    .dash-btn-sm { padding: 5px 10px; border-radius: 4px; font-size: 0.68rem; font-weight: 500; cursor: pointer; border: 1px solid #333; background: #1A1A1A; color: #C9A84C; transition: all 0.2s; font-family: 'Jost', sans-serif; }
    .dash-btn-sm:hover { background: #222; border-color: #C9A84C; }
    .dash-btn-wa { background: rgba(37,211,102,0.1); color: #25d366; border-color: rgba(37,211,102,0.2); }
    .dash-btn-wa:hover { background: rgba(37,211,102,0.2); }

    /* Modal */
    .dash-modal-bg { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.7); z-index: 1000; justify-content: center; align-items: flex-end; backdrop-filter: blur(3px); }
    .dash-modal-bg.open { display: flex; }
    .dash-modal { background: #111; border-top: 1px solid #C9A84C; border-radius: 16px 16px 0 0; width: 100%; max-width: 500px; max-height: 85vh; overflow-y: auto; padding: 24px; animation: modalUp 0.3s ease; }
    @keyframes modalUp { from { transform: translateY(100%); } to { transform: translateY(0); } }
    .dash-modal h3 { font-family: 'Cormorant Garamond', serif; font-size: 1.2rem; color: #E8D5A0; margin-bottom: 16px; }
    .dash-modal label { display: block; font-size: 0.72rem; font-weight: 600; color: #C9A84C; margin: 12px 0 4px; letter-spacing: 0.5px; }
    .dash-modal select, .dash-modal input, .dash-modal textarea { width: 100%; padding: 10px; background: #0A0A0A; border: 1px solid #333; border-radius: 6px; color: #E8D5A0; font-family: 'Jost', sans-serif; font-size: 0.88rem; }
    .dash-modal select:focus, .dash-modal input:focus, .dash-modal textarea:focus { outline: none; border-color: #C9A84C; }
    .dash-modal-actions { display: flex; gap: 10px; margin-top: 20px; }
    .dash-modal-save { flex: 1; padding: 12px; background: #C9A84C; color: #0A0A0A; border: none; border-radius: 6px; font-weight: 700; cursor: pointer; font-size: 0.88rem; }
    .dash-modal-save:hover { background: #E8D5A0; }
    .dash-modal-cancel { flex: 1; padding: 12px; background: transparent; color: #888; border: 1px solid #333; border-radius: 6px; cursor: pointer; font-size: 0.88rem; }

    /* Empty state */
    .dash-empty { text-align: center; padding: 60px 20px; color: #555; }
    .dash-empty p { font-size: 0.9rem; }

    /* Toast */
    .dash-toast { position: fixed; top: 20px; right: 20px; background: #C9A84C; color: #0A0A0A; padding: 14px 20px; border-radius: 10px; font-weight: 600; font-size: 0.85rem; z-index: 2000; box-shadow: 0 4px 20px rgba(0,0,0,0.4); transform: translateX(120%); transition: transform 0.3s ease; }
    .dash-toast.show { transform: translateX(0); }

    /* Responsive */
    @media (max-width: 768px) {
      .dash-stats { grid-template-columns: repeat(2, 1fr); }
      .dash-table { font-size: 0.75rem; }
    }
    @media (max-width: 480px) {
      .dash-stats { grid-template-columns: 1fr 1fr; gap: 8px; }
      .dash-stat { padding: 14px; }
      .dash-stat-num { font-size: 1.5rem; }
    }
  </style>
</head>
<body>

  <!-- Login -->
  <div class="dash-login" id="dash-login">
    <h1>Admin Dashboard</h1>
    <p>Thajvi Attire</p>
    <input type="email" id="dash-email" placeholder="Email" style="margin-bottom:10px;" />
    <input type="password" id="dash-pass" placeholder="Password" />
    <button id="dash-login-btn">Login</button>
    <p class="dash-login-err" id="dash-login-err"></p>
  </div>

  <!-- Dashboard -->
  <div class="dash" id="dash">
    <div class="dash-header">
      <h1 class="dash-title">Orders Dashboard</h1>
      <div class="dash-nav">
        <a href="../../admin/" class="dash-nav-link">Products</a>
        <a href="#" class="dash-nav-link active">Orders</a>
        <a href="../../stock-manager.html" class="dash-nav-link">Stock</a>
        <a href="../mobile/" class="dash-nav-link">Mobile</a>
      </div>
    </div>

    <!-- Stats -->
    <div class="dash-stats" id="dash-stats">
      <div class="dash-stat"><div class="dash-stat-num" id="stat-today-orders">-</div><div class="dash-stat-label" id="stat-orders-label">Today's Orders</div></div>
      <div class="dash-stat"><div class="dash-stat-num" id="stat-today-revenue">-</div><div class="dash-stat-label" id="stat-revenue-label">Today's Revenue</div></div>
      <div class="dash-stat warn"><div class="dash-stat-num" id="stat-pending">-</div><div class="dash-stat-label">Pending</div></div>
      <div class="dash-stat warn"><div class="dash-stat-num" id="stat-to-ship">-</div><div class="dash-stat-label">To Ship</div></div>
    </div>

    <!-- Filters -->
    <div class="dash-filters">
      <button class="dash-filter-btn active" data-filter="all">All</button>
      <button class="dash-filter-btn" data-filter="today">Today</button>
      <button class="dash-filter-btn" data-filter="week">This Week</button>
      <button class="dash-filter-btn" data-filter="pending">Pending</button>
      <button class="dash-filter-btn" data-filter="packed">Packed</button>
      <button class="dash-filter-btn" data-filter="shipped">Shipped</button>
      <button class="dash-filter-btn" data-filter="delivered">Delivered</button>
      <button class="dash-filter-btn" data-filter="pending_upi">Pending UPI</button>
      <input type="text" class="dash-search" id="dash-search" placeholder="Search name, phone, order ID..." />
    </div>

    <!-- Orders Table -->
    <div class="dash-table-wrap">
      <table class="dash-table">
        <thead>
          <tr><th>Order ID</th><th>Date</th><th>Customer</th><th>Items</th><th>Total</th><th>Payment</th><th>Shipping</th><th>Actions</th></tr>
        </thead>
        <tbody id="dash-orders"></tbody>
      </table>
    </div>
    <div class="dash-empty" id="dash-empty" style="display:none;"><p>No orders found</p></div>
  </div>

  <!-- Edit Modal -->
  <div class="dash-modal-bg" id="modal-bg">
    <div class="dash-modal">
      <h3 id="modal-title">Edit Order</h3>
      <label>Payment Status</label>
      <select id="modal-payment"><option value="pending">Pending</option><option value="paid">Paid</option><option value="failed">Failed</option><option value="refunded">Refunded</option></select>
      <label>Shipping Status</label>
      <select id="modal-shipping"><option value="pending">Pending</option><option value="packed">Packed</option><option value="shipped">Shipped</option><option value="delivered">Delivered</option><option value="cancelled">Cancelled</option></select>
      <label>Tracking Number</label>
      <input type="text" id="modal-tracking" placeholder="Enter tracking number" />
      <label>Courier</label>
      <select id="modal-courier"><option value="">Select Courier</option><option value="Delhivery">Delhivery</option><option value="DTDC">DTDC</option><option value="BlueDart">BlueDart</option><option value="India Post">India Post</option><option value="Shadowfax">Shadowfax</option><option value="Other">Other</option></select>
      <label>Notes</label>
      <textarea id="modal-notes" rows="3" placeholder="Internal notes..."></textarea>
      <input type="hidden" id="modal-order-id" />
      <div class="dash-modal-actions">
        <button class="dash-modal-cancel" id="modal-cancel">Cancel</button>
        <button class="dash-modal-save" id="modal-save">Save Changes</button>
      </div>
    </div>
  </div>

  <!-- Toast -->
  <div class="dash-toast" id="dash-toast"></div>

  <script src="../../assets/js/supabase-client.js"></script>
  <script src="../../assets/js/supabase-orders.js"></script>
  <script>
  (function() {
    var currentFilter = 'all';
    var allOrders = [];
    var sb = window.getOrInitSupabase ? window.getOrInitSupabase() : window.THAJVI_SUPABASE;

    // Login
    var loginBtn = document.getElementById('dash-login-btn');
    var emailInput = document.getElementById('dash-email');
    var passInput = document.getElementById('dash-pass');
    var loginErr = document.getElementById('dash-login-err');

    function showDash() {
      document.getElementById('dash-login').style.display = 'none';
      document.getElementById('dash').style.display = 'block';
      loadDashboard();
    }

    // Check if already logged in
    if (sb) {
      sb.auth.getSession().then(function(res) {
        if (res.data.session) showDash();
      });
    }

    function tryLogin() {
      if (!sb) {
        loginErr.textContent = 'Database not configured';
        loginErr.style.display = 'block';
        return;
      }
      var email = emailInput.value.trim();
      var pass = passInput.value;
      if (!email || !pass) {
        loginErr.textContent = 'Enter email and password';
        loginErr.style.display = 'block';
        return;
      }
      loginBtn.textContent = 'Logging in...';
      loginBtn.disabled = true;
      sb.auth.signInWithPassword({ email: email, password: pass }).then(function(res) {
        if (res.error) {
          loginErr.textContent = res.error.message;
          loginErr.style.display = 'block';
          loginBtn.textContent = 'Login';
          loginBtn.disabled = false;
        } else {
          showDash();
        }
      });
    }
    loginBtn.addEventListener('click', tryLogin);
    passInput.addEventListener('keydown', function(e) { if (e.key === 'Enter') tryLogin(); });

    // Load dashboard
    function loadDashboard() {
      loadStats();
      loadOrders();
      setupRealtime();
    }

    // Stats
    function loadStats() {
      // Initial stats load uses today filter
      if (typeof getAllOrdersFromSupabase !== 'function') return;
      getAllOrdersFromSupabase({ today: true }).then(function(orders) {
        updateStatsFromOrders(orders);
      });
    }

    function updateStatsFromOrders(orders) {
      var totalOrders = orders.length;
      var revenue = 0;
      var pending = 0;
      var toShip = 0;
      for (var i = 0; i < orders.length; i++) {
        var o = orders[i];
        if (o.payment_status === 'paid') revenue += (o.total || 0);
        if (o.payment_status === 'pending' || o.payment_status === 'pending_verification') pending++;
        if (o.shipping_status === 'pending' && o.payment_status === 'paid') toShip++;
      }
      document.getElementById('stat-today-orders').textContent = totalOrders;
      document.getElementById('stat-today-revenue').textContent = '\u20B9' + revenue.toLocaleString('en-IN');
      document.getElementById('stat-pending').textContent = pending;
      document.getElementById('stat-to-ship').textContent = toShip;

      // Update labels based on filter
      var labels = { all: 'All', today: "Today's", week: "This Week's", pending: 'Pending', packed: 'Packed', shipped: 'Shipped', delivered: 'Delivered', pending_upi: 'Pending UPI' };
      var label = labels[currentFilter] || 'All';
      document.getElementById('stat-orders-label').textContent = label + ' Orders';
      document.getElementById('stat-revenue-label').textContent = label + ' Revenue';
    }

    // Orders
    function loadOrders() {
      var filters = {};
      if (currentFilter === 'today') filters.today = true;
      if (currentFilter === 'week') filters.week = true;
      if (currentFilter === 'pending_upi') {
        filters.payment_status = 'pending_verification';
        filters.payment_method = 'upi';
      } else if (['pending', 'packed', 'shipped', 'delivered', 'cancelled'].indexOf(currentFilter) !== -1) {
        filters.shipping_status = currentFilter;
      }
      var search = document.getElementById('dash-search').value.trim();
      if (search) filters.search = search;

      getAllOrdersFromSupabase(filters).then(function(orders) {
        allOrders = orders;
        renderOrders(orders);
        updateStatsFromOrders(orders);
      });
    }

    // Render orders
    function renderOrders(orders) {
      var tbody = document.getElementById('dash-orders');
      var empty = document.getElementById('dash-empty');

      if (!orders.length) {
        tbody.innerHTML = '';
        empty.style.display = 'block';
        return;
      }
      empty.style.display = 'none';

      var html = '';
      for (var i = 0; i < orders.length; i++) {
        var o = orders[i];
        var date = new Date(o.created_at);
        var dateStr = date.toLocaleDateString('en-IN', { day: '2-digit', month: 'short', year: '2-digit' });
        var itemsSummary = '';
        if (o.order_items && o.order_items.length) {
          itemsSummary = o.order_items.map(function(it) { return it.product_name + ' (' + it.size + ') x' + it.quantity; }).join(', ');
        }
        var payBadge = 'badge-' + (o.payment_status || 'pending');
        var shipBadge = 'badge-' + (o.shipping_status || 'pending');

        html +=
          '<tr>' +
            '<td><span class="dash-oid">' + (o.order_id || '-') + '</span></td>' +
            '<td>' + dateStr + '</td>' +
            '<td><div class="dash-customer">' + (o.customer_name || '-') + '</div><div class="dash-phone">' + (o.customer_phone || '') + '</div></td>' +
            '<td><div class="dash-items">' + (itemsSummary || '-') + '</div></td>' +
            '<td>\u20B9' + ((o.total || 0).toLocaleString('en-IN')) + '</td>' +
            '<td><span class="badge ' + payBadge + '">' + (o.payment_status || 'pending') + '</span></td>' +
            '<td><span class="badge ' + shipBadge + '">' + (o.shipping_status || 'pending') + '</span></td>' +
            '<td><div class="dash-action">' +
              '<button class="dash-btn-sm" onclick="openEditModal(\'' + o.order_id + '\')">Edit</button>' +
              (o.payment_method === 'upi' && o.payment_status === 'pending_verification' ? '<button class="dash-btn-sm" style="background:rgba(76,175,80,0.1);color:#4CAF50;border-color:rgba(76,175,80,0.2);" onclick="markUpiPaid(\'' + o.order_id + '\',this)">Mark as Paid</button>' : '') +
              '<a class="dash-btn-sm dash-btn-wa" href="https://wa.me/' + (o.customer_phone || '').replace(/\D/g, '') + '?text=' + encodeURIComponent('Hi ' + (o.customer_name || '') + '! Regarding your Thajvi Attire order ' + (o.order_id || '')) + '" target="_blank">WhatsApp</a>' +
            '</div></td>' +
          '</tr>';
      }
      tbody.innerHTML = html;
    }

    // Filters
    document.querySelectorAll('.dash-filter-btn').forEach(function(btn) {
      btn.addEventListener('click', function() {
        document.querySelectorAll('.dash-filter-btn').forEach(function(b) { b.classList.remove('active'); });
        this.classList.add('active');
        currentFilter = this.dataset.filter;
        loadOrders();
      });
    });

    // Search
    var searchTimer;
    document.getElementById('dash-search').addEventListener('input', function() {
      clearTimeout(searchTimer);
      searchTimer = setTimeout(loadOrders, 400);
    });

    // Edit Modal
    window.openEditModal = function(orderId) {
      var order = allOrders.find(function(o) { return o.order_id === orderId; });
      if (!order) return;
      document.getElementById('modal-title').textContent = 'Edit ' + orderId;
      document.getElementById('modal-payment').value = order.payment_status || 'pending';
      document.getElementById('modal-shipping').value = order.shipping_status || 'pending';
      document.getElementById('modal-tracking').value = order.tracking_number || '';
      document.getElementById('modal-courier').value = order.courier || '';
      document.getElementById('modal-notes').value = order.notes || '';
      document.getElementById('modal-order-id').value = orderId;
      document.getElementById('modal-bg').classList.add('open');
    };

    document.getElementById('modal-cancel').addEventListener('click', function() {
      document.getElementById('modal-bg').classList.remove('open');
    });
    document.getElementById('modal-bg').addEventListener('click', function(e) {
      if (e.target === this) this.classList.remove('open');
    });

    document.getElementById('modal-save').addEventListener('click', function() {
      var orderId = document.getElementById('modal-order-id').value;
      var updates = {
        payment_status: document.getElementById('modal-payment').value,
        shipping_status: document.getElementById('modal-shipping').value,
        tracking_number: document.getElementById('modal-tracking').value,
        courier: document.getElementById('modal-courier').value,
        notes: document.getElementById('modal-notes').value
      };

      this.textContent = 'Saving...';
      this.disabled = true;
      var btn = this;

      updateOrderInSupabase(orderId, updates).then(function(res) {
        btn.textContent = 'Save Changes';
        btn.disabled = false;
        document.getElementById('modal-bg').classList.remove('open');
        if (res.success) {
          showToast('Updated ' + orderId);
          loadOrders();
          loadStats();
        } else {
          showToast('Update failed');
        }
      });
    });

    // Mark UPI as Paid
    window.markUpiPaid = function(orderId, btn) {
      if (!confirm('Mark order ' + orderId + ' as paid? This cannot be undone.')) return;
      btn.textContent = 'Saving...';
      btn.disabled = true;
      updateOrderInSupabase(orderId, { payment_status: 'paid' }).then(function(res) {
        if (res.success) {
          showToast('Marked as Paid: ' + orderId);
          loadOrders();
          loadStats();
        } else {
          showToast('Update failed');
          btn.textContent = 'Mark as Paid';
          btn.disabled = false;
        }
      });
    };

    // Toast
    function showToast(msg) {
      var toast = document.getElementById('dash-toast');
      toast.textContent = msg;
      toast.classList.add('show');
      setTimeout(function() { toast.classList.remove('show'); }, 3000);
    }

    // Realtime
    function setupRealtime() {
      if (!window.THAJVI_SUPABASE) return;
      try {
        window.THAJVI_SUPABASE.channel('orders-realtime')
          .on('postgres_changes', { event: 'INSERT', schema: 'public', table: 'orders' }, function(payload) {
            showToast('New Order! ' + (payload.new.customer_name || '') + ' \u2014 \u20B9' + (payload.new.total || 0));
            loadOrders();
            loadStats();
          })
          .subscribe();
      } catch (e) { console.log('Realtime setup skipped'); }
    }

  })();
  </script>

</body>
</html>
